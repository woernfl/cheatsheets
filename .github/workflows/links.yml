---
name: Links
permissions:
  contents: read
on: # yamllint disable-line rule:truthy
  workflow_dispatch:
  pull_request:
jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          fail: false
